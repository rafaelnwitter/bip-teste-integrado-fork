<div class="container">
  <div class="header">
    <h2>{{ isEdicao ? 'Editar' : 'Novo' }} Benefício</h2>
    <lib-button variant="secondary" (clicked)="cancelar()">← Voltar</lib-button>
  </div>

  <div class="error-msg" *ngIf="erro">{{ erro }}</div>
  <div class="success-msg" *ngIf="sucesso">{{ sucesso }}</div>

  <lib-loading [visivel]="loading" *ngIf="loading"></lib-loading>

  <form [formGroup]="form" (ngSubmit)="salvar()" *ngIf="!loading" class="form-card">
    <div class="field">
      <label>Nome *</label>
      <input formControlName="nome" placeholder="Nome do benefício" [class.error]="isInvalid('nome')" />
      <span class="field-error" *ngIf="isInvalid('nome')">
        Nome é obrigatório (máx. 100 caracteres)
      </span>
    </div>

    <div class="field">
      <label>Descrição</label>
      <textarea formControlName="descricao" placeholder="Descrição do benefício" rows="3"></textarea>
    </div>

    <div class="field">
      <label>Valor *</label>
      <input type="number" step="0.01" formControlName="valor"
             placeholder="0.00" [class.error]="isInvalid('valor')" />
      <span class="field-error" *ngIf="isInvalid('valor')">
        Valor é obrigatório e deve ser maior que zero
      </span>
    </div>

    <div class="field checkbox">
      <label>
        <input type="checkbox" formControlName="ativo" /> Ativo
      </label>
    </div>

    <div class="form-actions">
      <lib-button variant="primary" (clicked)="salvar()" [disabled]="form.invalid">
        {{ isEdicao ? 'Atualizar' : 'Criar' }}
      </lib-button>
      <lib-button variant="secondary" (clicked)="cancelar()">Cancelar</lib-button>
    </div>
  </form>
</div>
