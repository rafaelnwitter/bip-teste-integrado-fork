# docker-compose.yml
# Sobe o banco de dados PostgreSQL para o projeto BIP Teste Integrado.
# Uso: docker-compose up -d
#
# Serviços:
#   - db: PostgreSQL 16 (porta 5432)
#
# O backend (Spring Boot :8085) e o frontend (Angular :4200) são
# executados localmente via mvn spring-boot:run e ng serve.

services:
  db:
    image: postgres:16-alpine
    container_name: postgres_dev
    environment:
      POSTGRES_DB: backend_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend-module/src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./backend-module/src/main/resources/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d backend_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
