# docker-compose.yml
services:
  db:
    image: postgres:16-alpine
    container_name: postgres_dev
    environment:
      POSTGRES_DB: backend_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
